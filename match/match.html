        <!--Initializing swiper slider-->
        <script>
            var swiper = new Swiper(".mySwiper", {
                slidePerView: 3,
                spaceBetween: 30,
                grabCursor: true,
                autoplay: {
                    delay: 2500,
                    disableOnInteraction: false,
                    pauseeOnMouseEnter: true,
                }, 
                slidesPerGroup: 1,
                loop: true,
                loopFillGroupWithBlank: true,
