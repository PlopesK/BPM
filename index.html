<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Login</title>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <header>Login</header>
      <div class="progress-bar">
        <div class="step">
          <p>Nome</p>
          <div class="bullet">
            <span>1</span>
          </div>
          <div class="check fas fa-check"></div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="step">
          <p>Contato</p>
          <div class="bullet">
            <span>2</span>
          </div>
          <div class="check fas fa-check"></div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="step">
          <p>Idade</p>
          <div class="bullet">
            <span>3</span>
          </div>
          <div class="check fas fa-check"></div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="step">
          <p>Fim</p>
          <div class="bullet">
            <span>4</span>
          </div>
          <div class="check fas fa-check"></div>
        </div>
      </div>
   
      <div class="form-outer">
        <form class="#" id="form">
          <div class="page slidepage ">
            <div class="title">Basic info</div>
            <div class="field">
            <div class="label">Nome</div>
            <input type="text" id="nome">
            <i><img class="img-success" src="../icons/success-icon.svg" alt=""></i>
            <i><img class="img-error"  src="../icons/error-icon.svg" alt=""></i>
            
          </div>
          <div class="field">
            <div class="label">Sobrenome</div>
            <input type="text" id="sobrenome">
            <i><img class="img-success" src="../icons/success-icon.svg" alt=""></i>
            <i><img class="img-error" src="../icons/error-icon.svg" alt=""></i>
          </div>
          <div class="field nextBtn">
            <button>Next</button>
          </div>
          </div>

          <div class="page">
            <div class="title">contact info</div>
            <div class="field">
            <div class="label">Email</div>
            <input type="email" id="email">
            <i><img class="img-success" src="../icons/success-icon.svg" alt=""></i>
            <i><img class="img-error"src="../icons/error-icon.svg" alt=""></i>
          </div>
          <div class="field">
            <div class="label">Número de telefone</div>
            <input type="text" id="numero">
            <i><img class="img-success" src="../icons/success-icon.svg" alt=""></i>
            <i><img  class="img-error" src="../icons/error-icon.svg" alt=""></i>
          </div>
          <div class="field btns">
           <button class="prev-1">Voltar</button>
           <button class="next-1">Next</button>
          </div>
          </div>

          <div class="page">
            <div class="title">Data de nascimento</div>
            <div class="field">
            <div class="label">Date</div>
            <input type="text" id="data">
            <i><img class="img-success" src="icons/success-icon.svg" alt=""></i>
            <i><img class="img-error" src="icons/error-icon.svg" alt=""></i>
          </div>
          <div class="field">
            <div class="label">Sexo</div>
            <select>
              <option>Mulher</option>
              <option>Homem </option>
              <option>Outro</option>
            </select>
          </div>
          <div class="field btns">
           <button class="prev-2">Voltar</button>
           <button class="next-2">Next</button>
          </div>
          </div>

          <div class="page">
            <div class="title">Login</div>
            <div class="field">
            <div class="label">Nome de usuário</div>
            <input type="text" id="nickname">
            <i><img class="img-success" src="icons/success-icon.svg" alt=""></i>
            <i><img class="img-error"src="icons/error-icon.svg" alt=""></i>
          </div>
          <div class="field">
            <div class="label">Senha</div>
            <input type="password" id="senha">
            <i><img clas="img-success "src="icons/success-icon.svg" alt=""></i>
            <i><img  class="img-error"src="icons/error-icon.svg" alt=""></i>
          </div>
          <div class="field btns">
           <button class="prev-3">Voltar</button>
           <button class="submit">
            <a href="home/home.html">Enviar</a></button>
          </div>
        </div>

        </form>
      </div>
      <script src="js/teste.js"></script>
    </div>

  </body>
</html>
